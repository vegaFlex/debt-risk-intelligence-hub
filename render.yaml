services:
  - type: web
    name: debt-risk-intelligence-hub
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput && if [ "$RENDER_SEED_DEMO_DATA" = "1" ]; then python manage.py seed_demo_data; fi
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.4"
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: debt-risk-intelligence-hub-db
          property: connectionString
      - key: RENDER_SEED_DEMO_DATA
        sync: false
databases:
  - name: debt-risk-intelligence-hub-db
    databaseName: debt_risk_intelligence_hub
    user: debt_risk_intelligence_hub
    plan: free
